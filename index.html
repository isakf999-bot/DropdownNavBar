<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive navbar</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>

    <div class="nav" id="drop-nav">
        <a href="#home">Home</a>
        <a href="#products">Products</a>
        <a href="#contact">Contact</a>
        <div class="dropdown">
            <button class="dropbtn">Dropdown
                <i class="fa fa-caret-down"></i>
            </button>
            <div class="dropdown-content">
                <a href="#">20% Off on first order</a>
                <a href="#">Free bar on first order</a>
                <a href="#">Free shipping on first order</a>
            </div>
        </div>
        <a href="#about">About</a>
        <a class="icon" onclick="dropNav()"><i class="fa fa-bars"></i></a>
    </div>

    <div style="padding-left: 16px;">
        <h2>Responsive Topnav with dropdown</h2>
        <p>Made by Isak</p>
        <p>Hover over the dropdown button to open the dropdown menu</p>
    </div>

    <script>
        function dropnav() {
            let drop = document.getElementById("drop-nav");
            if (drop.className === "nav") {
                drop.className += " responsive";
            } else {
                drop.className = "nav";
            }
        }
    </script>
    
</body>
</html>
